version: "3.9"

services:
  mcp-primeira-mao:
    image: mcp-primeira-mao:v3.2.23
    networks:
      - network_public
    environment:
      # Transporte e porta interna
      - MCP_TRANSPORT=sse
      - PORT=8000
      # Banco de Dados — TODOS obrigatórios
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT:-5432}
      # Integrações externas
      - MOBI_SECRET=${MOBI_SECRET}
      - URL_AWS_TOKEN=${URL_AWS_TOKEN}
      - PRECIFICACAO_API_URL=${PRECIFICACAO_API_URL}
      - API_TIMEOUT=${API_TIMEOUT:-20}
      # ChatGPT Apps — verificação de domínio OpenAI
      - OPENAI_CHALLENGE_TOKEN=${OPENAI_CHALLENGE_TOKEN}
      # Lambda de estoque (fonte primária do widget)
      - LAMBDA_ESTOQUE_URL=${LAMBDA_ESTOQUE_URL}
      - LAMBDA_API_KEY=${LAMBDA_API_KEY}
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == maiamanager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - traefik.enable=true
        # Informa ao Traefik qual rede usar para rotear (obrigatório em Swarm multi-rede)
        - traefik.docker.network=network_public
        - traefik.http.routers.mcp-saga.rule=Host(`mcp-primeiramao.sagadatadriven.com.br`)
        - traefik.http.routers.mcp-saga.entrypoints=websecure
        - traefik.http.routers.mcp-saga.tls.certresolver=letsencryptresolver
        - traefik.http.routers.mcp-saga.service=mcp-saga
        - traefik.http.services.mcp-saga.loadbalancer.server.port=8000
        - traefik.http.services.mcp-saga.loadbalancer.passHostHeader=1
        # Middleware SSE: desabilita buffering no Traefik (obrigatório para SSE funcionar)
        # Sem isso o Traefik acumula chunks e a conexão SSE do ChatGPT trava/cai
        - traefik.http.middlewares.mcp-sse.headers.customResponseHeaders.X-Accel-Buffering=no
        - traefik.http.middlewares.mcp-sse.headers.customResponseHeaders.Cache-Control=no-cache
        - traefik.http.routers.mcp-saga.middlewares=mcp-sse

        #- "traefik.http.middlewares.mcp-auth.basicauth.users=maiamcp:$$2y$$10$$UgcXHrEHL3vjMZE35I7Q5.PFHavcdZOwUnMu88uj3m0q69wHa..rO"
        #- "traefik.http.routers.mcp-saga.middlewares=mcp-sse,mcp-auth"

networks:
  network_public:
    external: true
